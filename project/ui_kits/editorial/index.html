<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Klyra — Éditorial LinkedIn</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 28px; background: #FAFAFB; }
    #root { display: flex; flex-wrap: wrap; gap: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Post.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div data-screen-label="01 Editorial LinkedIn" style={{display:'flex', gap:20, flexWrap:'wrap'}}>
          <Post variant="dark" eyebrow="#1 · STRATÉGIE" title="Ton site ne te rapporte rien&nbsp;?" highlight="Voici pourquoi." footer="Klyra · 3 min de lecture" />
          <Post variant="blue" eyebrow="#2 · WEBDESIGN" title="Nous créons les outils digitaux pour booster" highlight="ta croissance." footer="Klyra Design" />
          <Post variant="light" eyebrow="#3 · CHIFFRES" title="47 projets." highlight="4.9/5 de satisfaction.">
            <p style={{marginTop:18, fontSize:16, lineHeight:1.5, color:'rgba(0,0,0,0.7)', maxWidth: 380}}>
              Depuis 2023, Klyra accompagne les PME avec une approche simple&nbsp;: la tech s'adapte au métier, jamais l'inverse.
            </p>
          </Post>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
