<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Pixel motif</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card" style="padding:0; overflow:hidden; border-radius:0;">
  <div id="stage" style="position:relative; height:220px; background:linear-gradient(180deg,#003FE4 0%, #000 100%);">
    <canvas id="c" width="1400" height="440" style="width:100%; height:100%; display:block;"></canvas>
    <div style="position:absolute; inset:0; display:flex; align-items:flex-end; padding:20px 28px; color:#fff;">
      <div>
        <div style="font-size:18px; font-weight:500; letter-spacing:-0.02em;">Mosaïque pixel</div>
        <div style="font-size:12px; color:rgba(255,255,255,0.65); margin-top:4px;">Carrés 4 px — rappel du K-mark, opacités 25–75%</div>
      </div>
    </div>
  </div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const cols = 70, rows = 22, s = 20;
const palette = [
  ['rgba(1,164,255,0.85)', 0.22],
  ['rgba(0,221,255,0.85)', 0.12],
  ['rgba(255,255,255,0.40)', 0.08],
  ['rgba(0,63,228,0.90)', 0.15],
];
for (let y=0; y<rows; y++) {
  for (let x=0; x<cols; x++) {
    const r = Math.random();
    let acc = 0;
    for (const [col, p] of palette) {
      acc += p;
      if (r < acc) {
        ctx.fillStyle = col;
        ctx.fillRect(x*s + 2, y*s + 2, s-4, s-4);
        break;
      }
    }
  }
}
</script>
</div></body></html>
