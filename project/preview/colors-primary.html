<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Brand Blues</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="row" style="gap:0; border-radius:12px; overflow:hidden;">
    <div style="flex:3; background:#003FE4; height:140px; display:flex; align-items:flex-end; padding:14px 16px; color:#fff;">
      <div>
        <div style="font-size:18px; font-weight:500; letter-spacing:-0.02em;">Bleu K1</div>
        <div style="font-size:12px; opacity:0.75; font-family:var(--font-mono); margin-top:2px;">#003FE4 · rgb(0,63,228)</div>
      </div>
    </div>
    <div style="flex:2; background:#01A4FF; height:140px; display:flex; align-items:flex-end; padding:14px 16px; color:#fff;">
      <div>
        <div style="font-size:18px; font-weight:500; letter-spacing:-0.02em;">Bleu K2</div>
        <div style="font-size:11px; opacity:0.85; font-family:var(--font-mono); margin-top:2px;">#01A4FF</div>
      </div>
    </div>
    <div style="flex:1.4; background:#00DDFF; height:140px; display:flex; align-items:flex-end; padding:14px 16px; color:#002DA4;">
      <div>
        <div style="font-size:18px; font-weight:500; letter-spacing:-0.02em;">Bleu K3</div>
        <div style="font-size:11px; opacity:0.85; font-family:var(--font-mono); margin-top:2px;">#00DDFF</div>
      </div>
    </div>
  </div>
  <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--fg-2);">
    <span>Palette principale — 3 teintes de bleu</span>
    <span style="font-family:var(--font-mono);">Structure → dynamisme → contraste</span>
  </div>
</div>
</body></html>
