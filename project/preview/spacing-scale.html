<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .bar { height:24px; background:#003FE4; border-radius:4px; }
  .row { display:flex; align-items:center; gap:14px; font-size:12px; color:var(--fg-2); }
  .row .num { font-family:var(--font-mono); width:44px; color:#000; font-weight:500;}
  .row .name { width:100px; }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="num">4</div><div class="name">sp-1</div><div class="bar" style="width:4px;"></div></div>
  <div class="row"><div class="num">8</div><div class="name">sp-2</div><div class="bar" style="width:8px;"></div></div>
  <div class="row"><div class="num">16</div><div class="name">sp-4</div><div class="bar" style="width:16px;"></div></div>
  <div class="row"><div class="num">24</div><div class="name">sp-6</div><div class="bar" style="width:24px;"></div></div>
  <div class="row"><div class="num">32</div><div class="name">sp-8</div><div class="bar" style="width:32px;"></div></div>
  <div class="row"><div class="num">52</div><div class="name">sp-13 · marge signature brand</div><div class="bar" style="width:52px;"></div></div>
  <div class="row"><div class="num">80</div><div class="name">sp-20</div><div class="bar" style="width:80px;"></div></div>
</div>
</body></html>
