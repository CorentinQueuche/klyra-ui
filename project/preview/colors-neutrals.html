<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">

      <div>
        <div style="font-size:15px; font-weight:500;">Noir</div>
        <div style="font-size:11px; opacity:0.65; font-family:var(--font-mono);">#000000</div>
      </div>
    </div>
    <div style="flex:1; background:#202020; height:130px; display:flex; align-items:flex-end; padding:12px 14px; color:#fff;">
      <div>
        <div style="font-size:15px; font-weight:500;">Ink</div>
        <div style="font-size:11px; opacity:0.65; font-family:var(--font-mono);">#202020</div>
      </div>
    </div>
    <div style="flex:1; background:#E0E0E0; height:130px; display:flex; align-items:flex-end; padding:12px 14px; color:#202020;">
      <div>
        <div style="font-size:15px; font-weight:500;">Gris K1</div>
        <div style="font-size:11px; opacity:0.65; font-family:var(--font-mono);">#E0E0E0</div>
      </div>
    </div>
    <div style="flex:1; background:#FFFFFF; height:130px; display:flex; align-items:flex-end; padding:12px 14px; color:#202020;">
      <div>
        <div style="font-size:15px; font-weight:500;">Blanc</div>
        <div style="font-size:11px; opacity:0.65; font-family:var(--font-mono);">#FFFFFF</div>
      </div>
    </div>
  </div>
  <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--fg-2);">
    <span>Neutres — équilibre et clarté</span>
  </div>
</div>
</body></html>
