<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Cards light</title>
<link rel="stylesheet" href="_card.css">
<style>
  .k-card { background:#fff; border:1px solid #E0E0E0; border-radius:16px; padding:18px;
    box-shadow: 0 6px 18px rgba(0,45,164,0.08); display:flex; flex-direction:column; gap:10px; flex:1;}
  .k-card .h { font-size:15px; font-weight:500; letter-spacing:-0.02em;}
  .k-card .p { font-size:12px; color:var(--fg-2); line-height:1.4;}
  .stat { font-size:38px; font-weight:500; letter-spacing:-0.035em; line-height:0.9; color:#003FE4;}
</style></head>
<body>
<div class="card">
  <div style="display:flex; gap:12px;">
    <div class="k-card">
      <div class="stat">+20</div>
      <div class="h">Entreprises nous font confiance</div>
      <div class="p">PME ambitieuses accompagnées sur leurs outils digitaux.</div>
    </div>
    <div class="k-card">
      <div class="stat">4.9</div>
      <div class="h">Note moyenne client</div>
      <div class="p">Basée sur 47 projets livrés depuis 2023.</div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--fg-2);">Cards claires · radius 16 · ombre bleutée douce</div>
</div>
</body></html>
