<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Layout grid</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card" style="padding:0; overflow:hidden;">
  <div style="position:relative; height:260px; background:#fff; border:1px solid #E0E0E0; margin:24px;">
    <!-- 52px outer margin indicators -->
    <div style="position:absolute; left:26px; top:26px; right:26px; bottom:26px; border:1px dashed #003FE4; opacity:0.5;"></div>
    <!-- top-left logo -->
    <div style="position:absolute; left:26px; top:26px; width:26px; height:26px; background:#003FE4; border-radius:4px;"></div>
    <!-- top-right marker -->
    <div style="position:absolute; right:26px; top:26px; font-size:24px; font-weight:500; letter-spacing:-0.03em; color:rgba(0,0,0,0.35);">1.1</div>
    <!-- bottom-left eyebrow -->
    <div style="position:absolute; left:26px; bottom:22px; font-size:11px; color:#000;">Brand Guidelines — Couleurs</div>
    <!-- bottom-right signature -->
    <div style="position:absolute; right:26px; bottom:22px; font-size:11px; color:#000;">Klyra Design</div>
    <!-- vertical rule -->
    <div style="position:absolute; left:184px; top:26px; bottom:26px; width:1px; background:#000;"></div>
    <!-- horizontal rule -->
    <div style="position:absolute; left:26px; right:26px; bottom:44px; height:1px; background:#000;"></div>
    <div style="position:absolute; left:200px; top:80px; font-size:15px; color:var(--fg-2); max-width:260px; line-height:1.4;">Grille signature brand · marge 52px · logo TL · marker TR · eyebrow BL · signature BR · hairlines 1px</div>
  </div>
</div>
</body></html>
