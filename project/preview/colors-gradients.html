<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Gradients</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
    <div style="border-radius:12px; overflow:hidden;">
      <div style="height:82px; background:linear-gradient(180deg,#003FE4 0%,#000000 100%);"></div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:6px; display:flex; justify-content:space-between;">
        <span>Noir ← Bleu K1</span>
        <span style="font-family:var(--font-mono);">#003FE4 → #000000</span>
      </div>
    </div>
    <div style="border-radius:12px; overflow:hidden;">
      <div style="height:82px; background:linear-gradient(180deg,#003FE4 0%,#01A4FF 100%);"></div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:6px; display:flex; justify-content:space-between;">
        <span>Bleu K1 → Bleu K2</span>
        <span style="font-family:var(--font-mono);">#003FE4 → #01A4FF</span>
      </div>
    </div>
    <div style="border-radius:12px; overflow:hidden;">
      <div style="height:82px; background:linear-gradient(180deg,#000000 0%,#202020 100%);"></div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:6px; display:flex; justify-content:space-between;">
        <span>Noir → Ink</span>
        <span style="font-family:var(--font-mono);">#000000 → #202020</span>
      </div>
    </div>
    <div style="border-radius:12px; overflow:hidden; border:1px solid #e0e0e0;">
      <div style="height:82px; background:linear-gradient(180deg,#E0E0E0 0%,#FFFFFF 100%);"></div>
      <div style="font-size:12px; color:var(--fg-2); margin-top:6px; display:flex; justify-content:space-between;">
        <span>Gris K1 → Blanc</span>
        <span style="font-family:var(--font-mono);">#E0E0E0 → #FFFFFF</span>
      </div>
    </div>
  </div>
</div>
</body></html>
